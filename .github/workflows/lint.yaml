# uv run ruff check .
# uv run ruff format --check .
# uv run ruff format []
name: Lint

on:
  push:
    branches: [main]          # adjust
  pull_request:
    branches: [main]          # adjust (PR base branches)

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"       # adjust to your project

      # If you have uv.lock, prefer --frozen for reproducibility
      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .
